<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健身回本计划</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
    }

    body {
      background: #f5f7fa;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      min-height: calc(100vh - 40px);
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    h2 {
      text-align: center;
      color: #222;
      margin-bottom: 8px;
    }

    .sub-title {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .day-count {
      color: #e64340;
      font-weight: bold;
    }

    .set-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .set-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
      gap: 12px;
    }

    .set-item input {
      width: 100px;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 8px;
      text-align: right;
      font-size: 16px;
    }

    .count-card {
      display: flex;
      gap: 12px;
      margin-top: 14px;
    }

    .record-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .record-title {
      text-align: center;
      color: #222;
      font-size: 1.2em;
      font-weight: bold;
    }

    .count-box {
      flex: 1;
      text-align: center;
      padding: 24px 10px;
      border-radius: 12px;
      color: #fff;
    }

    .swim {
      background: #409eff;
    }

    .course {
      background: #67c23a;
    }

    .count-value {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      margin: 10px 0;
    }

    .num {
      font-size: 32px;
      font-weight: bold;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .add {
      background: rgba(255, 255, 255, 0.3);
      color: #fff;
    }

    .progress-btn {
      width: 100%;
      background: #1890ff;
      color: #fff;
      margin-top: 14px;
    }

    .progress-btn:disabled {
      background: #eee;
      color: #999;
      cursor: not-allowed;
    }

    .info-card {
      background: #f0f7ff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      line-height: 2;
      color: #333;
      gap: 12px;
    }

    .reset-btn,
    .save-btn {
      width: 100%;
      background: #eee;
      color: #666;
      margin-top: 10px;
    }

    .save-btn {
      background: #e6f4ff;
      color: #1890ff;
      margin-bottom: 8px;
    }

    .price-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .price-actions button {
      margin-top: 0;
    }

    .saved-btn {
      background: #1890ff;
      color: #fff;
      cursor: default;
    }

    .edit-btn {
      background: #fff;
      color: #1890ff;
      border: 1px solid #91d5ff;
    }

    .hidden {
      display: none;
    }

    input:disabled {
      background: #f5f5f5;
      color: #666;
      cursor: not-allowed;
    }

    .money-text {
      font-size: 18px;
      color: #e64340;
      font-weight: bold;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 20px 0;
    }

    .history-header {
      position: relative;
    }

    .header-back-btn {
      position: absolute;
      left: 0;
      top: 0;
      width: auto;
      background: transparent;
      color: #1890ff;
      padding: 0;
      font-size: 14px;
    }

    .history-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 14px;
    }

    .history-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .history-time {
      color: #222;
      font-weight: bold;
    }

    .delete-record-btn {
      width: 28px;
      height: 28px;
      flex: 0 0 auto;
      background: transparent;
      padding: 0;
    }

    .delete-record-icon {
      width: 20px;
      height: 20px;
      display: block;
    }

    .history-empty {
      text-align: center;
      color: #999;
      padding: 32px 0;
    }

    .back-btn {
      width: 100%;
      background: #e6f4ff;
      color: #1890ff;
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.78);
      color: #fff;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container" id="mainPage">
    <h2>健身回本计划</h2>
    <div class="sub-title" id="dateTip"></div>

    <div class="set-card">
      <div class="set-item">
        <span>游泳单次单价（元）</span>
        <input type="number" step="0.01" id="swimPrice" placeholder="0.00">
      </div>
      <div class="set-item">
        <span>团课单次单价（元）</span>
        <input type="number" step="0.01" id="coursePrice" placeholder="0.00">
      </div>
      <div id="saveActions">
        <button class="save-btn" onclick="savePrice()">保存单价</button>
      </div>
      <div class="price-actions hidden" id="savedActions">
        <button class="saved-btn" disabled>已保存</button>
        <button class="edit-btn" onclick="editPrice()">去修改</button>
      </div>
    </div>

    <div class="record-card">
      <div class="record-title">今日打卡记录</div>
      <div class="count-card">
        <div class="count-box swim">
          <div>游泳打卡</div>
          <div class="count-value">
            <span class="num" id="swimCount">0</span>
            <span>次</span>
          </div>
          <div class="btn-group">
            <button class="add" onclick="changeNum('swim', 1)">+1</button>
            <button class="add" onclick="changeNum('swim', -1)">-1</button>
          </div>
        </div>
        <div class="count-box course">
          <div>团课打卡</div>
          <div class="count-value">
            <span class="num" id="courseCount">0</span>
            <span>次</span>
          </div>
          <div class="btn-group">
            <button class="add" onclick="changeNum('course', 1)">+1</button>
            <button class="add" onclick="changeNum('course', -1)">-1</button>
          </div>
        </div>
      </div>
      <button class="progress-btn" id="saveProgressBtn" onclick="saveProgress()" disabled>保存进度</button>
    </div>

    <div class="info-card">
      <div class="info-item">
        <span>健身卡费用</span>
        <span>3500.00 元</span>
      </div>
      <div class="info-item">
        <span>游泳累计花费</span>
        <span id="swimUsed" class="money-text">0.00 元</span>
      </div>
      <div class="info-item">
        <span>团课累计花费</span>
        <span id="courseUsed" class="money-text">0.00 元</span>
      </div>
      <div class="info-item">
        <span>合计已花费</span>
        <span id="allUsed" class="money-text">0.00 元</span>
      </div>
      <div class="info-item">
        <span>剩余金额</span>
        <span id="leftMoney">3500.00 元</span>
      </div>
    </div>

    <button class="reset-btn" onclick="goHistory()">查看打卡记录</button>
  </div>

  <div class="container hidden" id="historyPage">
    <div class="history-header">
      <button class="header-back-btn" onclick="goHome()">返回</button>
      <h2>历史打卡记录</h2>
    </div>
    <div class="sub-title">查看每次打卡情况</div>
    <div class="history-list" id="historyList"></div>
    <button class="back-btn" onclick="goHome()">返回首页</button>
  </div>

  <div class="toast" id="toast">今日打卡记录已保存</div>

  <script>
    const TOTAL_FEE = 3500;
    const expireDate = new Date("2027-10-16");
    const storageKey = "fitCostData";

    function initDateTip() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const date = now.getDate();
      const diffTime = expireDate - now;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      let tip = `${year}年${month}月${date}日`;

      if (diffDays > 0) {
        tip += `：距离健身卡到期还剩 <span class="day-count">${diffDays} 天</span>`;
      } else if (diffDays === 0) {
        tip += `，<span class="day-count">今日健身卡到期</span>`;
      } else {
        tip += `，健身卡已过期 <span class="day-count">${Math.abs(diffDays)} 天</span>`;
      }

      document.getElementById("dateTip").innerHTML = tip;
    }

    function createDefaultData() {
      return {
        swimPrice: 0,
        coursePrice: 0,
        todaySwimCnt: 0,
        todayCourseCnt: 0,
        priceSaved: false,
        records: []
      };
    }

    function normalizeData(savedData) {
      const defaultData = createDefaultData();
      const parsedData = savedData || defaultData;

      return {
        ...defaultData,
        ...parsedData,
        swimPrice: Number(parsedData.swimPrice) || 0,
        coursePrice: Number(parsedData.coursePrice) || 0,
        todaySwimCnt: Number(parsedData.todaySwimCnt ?? parsedData.swimCnt) || 0,
        todayCourseCnt: Number(parsedData.todayCourseCnt ?? parsedData.courseCnt) || 0,
        priceSaved: Boolean(parsedData.priceSaved),
        records: Array.isArray(parsedData.records) ? parsedData.records : []
      };
    }

    let data = normalizeData(JSON.parse(localStorage.getItem(storageKey)));

    function saveData() {
      localStorage.setItem(storageKey, JSON.stringify(data));
    }

    function formatMoney(value) {
      return `${Number(value).toFixed(2)} 元`;
    }

    function formatDateTime(dateValue) {
      const date = new Date(dateValue);
      const pad = (num) => String(num).padStart(2, "0");

      return `${date.getFullYear()}年${pad(date.getMonth() + 1)}月${pad(date.getDate())}日 ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function calcTotals() {
      return data.records.reduce((totals, record) => {
        const swimAmount = Number(record.swimAmount) || 0;
        const courseAmount = Number(record.courseAmount) || 0;

        totals.swimCost += swimAmount;
        totals.courseCost += courseAmount;
        return totals;
      }, {
        swimCost: 0,
        courseCost: 0
      });
    }

    function render() {
      const swimPriceInput = document.getElementById("swimPrice");
      const coursePriceInput = document.getElementById("coursePrice");
      const saveActions = document.getElementById("saveActions");
      const savedActions = document.getElementById("savedActions");
      const saveProgressBtn = document.getElementById("saveProgressBtn");
      const hasTodayRecord = data.todaySwimCnt > 0 || data.todayCourseCnt > 0;

      swimPriceInput.value = data.swimPrice;
      coursePriceInput.value = data.coursePrice;
      swimPriceInput.disabled = data.priceSaved;
      coursePriceInput.disabled = data.priceSaved;
      saveActions.classList.toggle("hidden", data.priceSaved);
      savedActions.classList.toggle("hidden", !data.priceSaved);
      document.getElementById("swimCount").innerText = data.todaySwimCnt;
      document.getElementById("courseCount").innerText = data.todayCourseCnt;
      saveProgressBtn.disabled = !hasTodayRecord;

      const totals = calcTotals();
      const allCost = totals.swimCost + totals.courseCost;
      const left = TOTAL_FEE - allCost;

      document.getElementById("swimUsed").innerText = formatMoney(totals.swimCost);
      document.getElementById("courseUsed").innerText = formatMoney(totals.courseCost);
      document.getElementById("allUsed").innerText = formatMoney(allCost);
      document.getElementById("leftMoney").innerText = formatMoney(left);

      saveData();
    }

    function savePrice() {
      data.swimPrice = Number(document.getElementById("swimPrice").value) || 0;
      data.coursePrice = Number(document.getElementById("coursePrice").value) || 0;
      data.priceSaved = true;
      render();
    }

    function editPrice() {
      data.priceSaved = false;
      render();
    }

    function changeNum(type, step) {
      if (type === "swim") {
        data.todaySwimCnt = Math.max(0, data.todaySwimCnt + step);
      } else {
        data.todayCourseCnt = Math.max(0, data.todayCourseCnt + step);
      }

      render();
    }

    function saveProgress() {
      if (data.todaySwimCnt === 0 && data.todayCourseCnt === 0) {
        return;
      }

      const swimAmount = Number((data.todaySwimCnt * data.swimPrice).toFixed(2));
      const courseAmount = Number((data.todayCourseCnt * data.coursePrice).toFixed(2));

      data.records.unshift({
        id: Date.now(),
        savedAt: new Date().toISOString(),
        swimCnt: data.todaySwimCnt,
        courseCnt: data.todayCourseCnt,
        swimPrice: data.swimPrice,
        coursePrice: data.coursePrice,
        swimAmount,
        courseAmount
      });
      data.todaySwimCnt = 0;
      data.todayCourseCnt = 0;
      render();
      showToast("今日打卡记录已保存");
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.innerText = message;
      toast.classList.add("show");

      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function renderHistory() {
      const historyList = document.getElementById("historyList");

      if (data.records.length === 0) {
        historyList.innerHTML = '<div class="history-empty">暂无打卡记录</div>';
        return;
      }

      historyList.innerHTML = data.records.map((record) => {
        const swimCnt = Number(record.swimCnt) || 0;
        const courseCnt = Number(record.courseCnt) || 0;
        const swimAmount = Number(record.swimAmount) || 0;
        const courseAmount = Number(record.courseAmount) || 0;

        return `
          <div class="history-item">
            <div class="history-item-header">
              <div class="history-time">${formatDateTime(record.savedAt)}</div>
              <button class="delete-record-btn" onclick="deleteRecord(${record.id})" aria-label="删除该条记录">
                <img class="delete-record-icon" src="https://dimg04.tripcdn.com/images/1t34q12000sawz9ml931D.png" alt="">
              </button>
            </div>
            <div class="info-item">
              <span>游泳打卡</span>
              <span>${swimCnt} 次 / ${formatMoney(swimAmount)}</span>
            </div>
            <div class="info-item">
              <span>团课打卡</span>
              <span>${courseCnt} 次 / ${formatMoney(courseAmount)}</span>
            </div>
          </div>
        `;
      }).join("");
    }

    function deleteRecord(recordId) {
      data.records = data.records.filter((record) => record.id !== recordId);
      render();
      renderHistory();
      showToast("打卡记录已删除");
    }

    function goHistory() {
      location.hash = "history";
      renderPage();
    }

    function goHome() {
      location.hash = "";
      renderPage();
    }

    function renderPage() {
      const isHistoryPage = location.hash === "#history";

      document.getElementById("mainPage").classList.toggle("hidden", isHistoryPage);
      document.getElementById("historyPage").classList.toggle("hidden", !isHistoryPage);

      if (isHistoryPage) {
        renderHistory();
      }
    }

    initDateTip();
    render();
    renderPage();
    window.addEventListener("hashchange", renderPage);
  </script>
</body>
</html>
